<!DOCTYPE html>
<html lang="ko">
<head>

  <meta property="og:type" content="website">
  <meta property="og:title" content="지틈 — 만든 것들이 깃드는 자리">
  <meta property="og:description" content="일상의 틈에 깃드는 작은 앱들을 만듭니다.">
  <meta property="og:url" content="https://www.jiteum.com/">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: flex; flex-direction: column;
      background: #FBF7F2; color: #1A140F;
      font-family: 'Pretendard', -apple-system, sans-serif; line-height: 1.7;
      word-break: keep-all; -webkit-font-smoothing: antialiased;
    }
    main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 64px 24px; text-align: center; }
    h1 { margin: 0; font-size: clamp(34px, 7vw, 54px); font-weight: 800; letter-spacing: -.03em; }
    .sub { margin: 16px 0 48px; color: #8A7E73; font-size: clamp(15px, 2.4vw, 17.5px); font-weight: 500; }
    .apps { display: flex; flex-direction: column; gap: 16px; width: min(420px, 100%); }
    .app-card {
      display: flex; align-items: center; gap: 16px; text-align: left;
      background: #fff; border: 1px solid rgba(26,20,15,.08); border-radius: 20px;
      padding: 18px 20px; text-decoration: none; color: inherit;
      transition: transform .15s ease, box-shadow .15s ease;
      box-shadow: 0 6px 18px rgba(26,20,15,.05);
    }
    .app-card:hover { transform: translateY(-2px); box-shadow: 0 12px 28px rgba(26,20,15,.1); }
    .app-card img { width: 52px; height: 52px; border-radius: 13px; }
    .app-card b { display: block; font-size: 17.5px; letter-spacing: -.01em; }
    .app-card span { color: #8A7E73; font-size: 14px; }
    .app-card .go { margin-left: auto; color: #C96F4A; font-weight: 700; font-size: 18px; }
    footer { padding: 28px; text-align: center; color: #8A7E73; font-size: 13.5px; }
  </style>
</head>
<body>
  <main>
    <h1>지틈</h1>
    <p class="sub">일상의 틈에 깃드는 작은 앱들을 만듭니다.</p>
    <div class="apps">
      <a class="app-card" href="eungyeol/">
        <img src="eungyeol/assets/logo_mark.png?v=3" alt="">
        <div>
          <b>은결</b>
          <span>기록할수록, 나를 알게 됩니다 — 3분 마음 기록</span>
        </div>
        <span class="go">→</span>
      </a>
    </div>
  </main>
  <footer>© 2026 지틈 · jiteum.com</footer>
