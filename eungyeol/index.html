<!DOCTYPE html>
<!--
  옛 은결 경로 → 마음테 경로 리다이렉트 스텁.
  2026-07-17 앱명이 은결에서 마음테로 되돌아가며 /eungyeol/ → /maumte/ 로 옮겼다.
  /eungyeol/ 은 2026-07-13~17 사이 라이브였으므로, 그때 걸린 링크·색인이 깨지지
  않도록 남겨 둔다. GitHub Pages 는 정적이라 301 을 못 주므로 meta refresh +
  canonical(검색엔진에 새 주소를 알림) 로 처리한다.
-->
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="robots" content="noindex">
  <meta http-equiv="refresh" content="0; url=/">
  <link rel="canonical" href="https://www.jiteum.com/">
  <title>마음테 — 기록할수록, 나를 알게 됩니다</title>
</head>
<body>
  <p>주소가 바뀌었습니다. <a href="/">마음테 페이지로 이동합니다…</a></p>
</body>
</html>
